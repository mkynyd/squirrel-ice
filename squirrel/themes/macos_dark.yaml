name: macOS Dark
author: WuSong
color_scheme:
  back_color: 0x1F1F1F
  candidate_text_color: 0xD7D7D7
  hilited_candidate_back_color: 0x0B9F5A
  hilited_candidate_text_color: 0xFFFFFF
  label_color: 0x7A7A7A
  hilited_candidate_label_color: 0xFFFFFF
  comment_text_color: 0x7A7A7A
style:
